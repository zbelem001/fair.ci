
<!-- Sidebar Navigation (SideNavBar) -->
<aside class="hidden md:flex flex-col fixed inset-y-0 left-0 w-64 bg-stone-50 border-r-0 z-40 transition-all duration-300 ease-in-out">
<div class="flex flex-col gap-2 p-4 h-full">
<div class="mb-8 px-4">
<h1 class="text-xl font-bold text-stone-900 tracking-tight">Fair.ci Merchant</h1>
<p class="text-xs text-stone-500 font-medium">Local Artisan Portal</p>
</div>
<nav class="flex-1 space-y-1">
<a routerLink="/" routerLinkActive="bg-orange-200 text-orange-800" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 text-stone-500 hover:bg-stone-200 rounded-xl px-4 py-3 transition-all duration-200">
<span class="material-symbols-outlined">storefront</span>
<span>Marketplace</span>
</a>
<a routerLink="/vendor-interface" routerLinkActive="bg-orange-200 text-orange-800 font-bold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 text-stone-500 hover:bg-stone-200 rounded-xl px-4 py-3 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">store</span>
<span>My Shop</span>
</a>
<a routerLink="/vendor-interface/add-product" routerLinkActive="bg-orange-200 text-orange-800 font-bold" class="flex items-center gap-3 text-stone-500 hover:bg-stone-200 rounded-xl px-4 py-3 transition-all duration-200 cursor-pointer">
<span class="material-symbols-outlined">add_circle</span>
<span>Ajouter produit</span>
</a>

</nav>
<div class="mt-auto pt-6 border-t border-stone-200">
<button (click)="logout()" class="w-full bg-stone-100 hover:bg-stone-200 text-stone-700 py-3 px-4 rounded-xl font-bold shadow-sm active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">logout</span>
<span>Déconnexion</span>
</button>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 md:ml-64 p-6 md:p-10 mb-20 md:mb-0">
<!-- Header / Top Bar Profile -->
<header class="flex justify-between items-center mb-10">
<div class="flex-1">
<a routerLink="/" class="inline-flex items-center gap-2 bg-stone-100 hover:bg-stone-200 text-stone-700 py-2 px-4 rounded-xl font-bold transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
Retourner au marketplace
</a>
</div>
<div class="flex items-center gap-4">
<div class="text-right hidden sm:block">
<p class="text-sm font-bold">{{ vendorName }}</p>
<p class="text-xs text-on-surface-variant">Merchant ID: #{{ vendorId }}</p>
</div>
<img class="w-12 h-12 rounded-full object-cover border-2 border-primary-fixed shadow-sm" data-alt="portrait of a proud West African artisan smiling warmly in his studio workshop" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmJDiSil8WIh0SqX10purA9iLddYJkxEd8K4NM-tu_qC9FQQ-cGYL9s2bLSk1aw2HeDaKXA51aT1gjqLg5rg4nXHxR83UGP7QedUUMj39LfnhfOkS-tLG2lguQvevkMtrihSiEkz9Eal6uhAYeO4WJ6qDutYnKL2-3N9E81ECwXkN9D4RjnpRveeyEm0iCNws0nRPRaurIvGqN0faE1afvm10LceYsg-xijWsYIrNX3faWnuyGOFOO5DmP3_XDkq5IhSteQH6lxUw"/>
</div>
</header>

            <router-outlet></router-outlet>
</main>
<!-- Mobile Navigation Shell (BottomNavBar) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full bg-white/80 dark:bg-stone-950/80 backdrop-blur-md border-t border-stone-100/10 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 flex justify-around items-center px-4 pb-6 pt-3">
<a routerLink="/" routerLinkActive="bg-orange-200 text-orange-800 rounded-2xl" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 tap-highlight-transparent">
<span class="material-symbols-outlined">home</span>
<span class="text-[11px] font-bold uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 tap-highlight-transparent" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[11px] font-bold uppercase tracking-widest mt-1">Explore</span>
</a>
<a routerLink="/vendor-interface" routerLinkActive="bg-orange-200 text-orange-800 rounded-2xl" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 tap-highlight-transparent">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">storefront</span>
<span class="text-[11px] font-bold uppercase tracking-widest mt-1">My Shop</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 px-5 py-2 tap-highlight-transparent" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[11px] font-bold uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
<!-- WhatsApp Floating Action Button (FAB) -->
<div class="fixed bottom-24 right-6 md:bottom-10 md:right-10 z-30">
<button class="w-16 h-16 bg-tertiary text-white rounded-full shadow-[0_15px_35px_rgba(0,110,45,0.3)] flex items-center justify-center active:scale-90 transition-all group overflow-hidden">
<span class="material-symbols-outlined text-3xl">chat</span>
<div class="absolute -top-12 opacity-0 group-hover:top-[-45px] group-hover:opacity-100 transition-all bg-on-surface text-surface text-[10px] px-3 py-1 rounded-lg whitespace-nowrap font-bold uppercase tracking-widest">Customer Support</div>
</button>
</div>
