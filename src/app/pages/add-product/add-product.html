<div class="pt-8 w-full max-w-7xl mx-auto px-4">
<form (ngSubmit)="onSubmit()">
<div class="mb-8">
<h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2">Ajouter un produit</h1>
<p class="text-secondary">Créez une fiche produit attrayante pour vos clients.</p>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<!-- Left Column: Main Form -->
<div class="lg:col-span-2 space-y-8">
<!-- Section 1: Informations générales -->
<section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_50px_rgba(157,67,0,0.03)] border-0">
<div class="flex items-center gap-3 mb-8">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="edit_note">edit_note</span>
</div>
<h3 class="text-xl font-bold text-on-surface">Informations générales</h3>
</div>
<div class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Nom du produit</label>
<input class="w-full px-5 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300 placeholder:text-stone-400" placeholder="Ex: Vase en argile de Katiola" type="text" name="title" [(ngModel)]="productObj.title" required/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Prix (CFA)</label>
<div class="relative">
<input class="w-full pl-5 pr-12 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300" placeholder="0" type="number" name="price" [(ngModel)]="productObj.price" required/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 font-bold">CFA</span>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Prix réduit (Optionnel)</label>
<div class="relative">
<input class="w-full pl-5 pr-12 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300" placeholder="0" type="number" name="price_reduit" [(ngModel)]="productObj.price_reduit"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 font-bold">CFA</span>
</div>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Description détaillée</label>
<textarea class="w-full px-5 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300 resize-none" placeholder="Décrivez l'histoire, les matériaux et les dimensions de votre création..." rows="6" name="description" [(ngModel)]="productObj.description" required></textarea>                                                                                             </div>
</div>
</section>
<!-- Section 2: Images du produit -->
<section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_50px_rgba(157,67,0,0.03)] border-0">
<div class="flex items-center gap-3 mb-8">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="photo_library">photo_library</span>
</div>
<h3 class="text-xl font-bold text-on-surface">Images du produit</h3>
</div>

<!-- Images Upload Section -->
<div class="space-y-4">
  <label class="block border-2 border-dashed border-outline-variant/30 rounded-2xl p-12 text-center bg-surface-container-low/30 hover:bg-surface-container-low/60 transition-colors cursor-pointer group relative">
    <input type="file" class="hidden" (change)="onFileSelected($event)" accept="image/*" multiple [disabled]="isUploading">
    
    <div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high text-primary group-hover:scale-110 transition-transform" *ngIf="!isUploading">
      <span class="material-symbols-outlined text-4xl" data-icon="add_photo_alternate">add_photo_alternate</span>
    </div>
    
    <div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high text-primary" *ngIf="isUploading">
      <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <p class="text-lg font-bold text-on-surface mb-1">{{ isUploading ? 'Téléchargement en cours...' : 'Cliquez pour ajouter des photos' }}</p>
    <p class="text-sm text-on-surface-variant">Formats supportés: JPG, PNG, WEBP (Max 5MB)</p>
  </label>

  <!-- Previews -->
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" *ngIf="productObj.images.length > 0">
    <div *ngFor="let img of productObj.images; let i = index" class="relative group rounded-xl overflow-hidden aspect-square border border-surface-container-highest">
      <img [src]="img" class="w-full h-full object-cover" alt="Product Image">
      <button type="button" (click)="removeImage(i)" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-red-500/80 text-white flex items-center justify-center backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600">
        <span class="material-symbols-outlined text-sm" data-icon="close">close</span>
      </button>
    </div>
  </div>
</div>

</section>
</div>
<!-- Right Column: Sidebar Options -->
<div class="lg:col-span-1 space-y-8">
<!-- Section 3: Inventaire & Catégorisation -->
<section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_50px_rgba(157,67,0,0.03)] border-0">
<div class="flex items-center gap-3 mb-8">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="category">category</span>
</div>
<h3 class="text-xl font-bold text-on-surface">Organisation</h3>
</div>
<div class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Catégorie</label>
<select class="w-full px-5 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%239d4300%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:20px_20px] bg-[right_1.25rem_center] bg-no-repeat" name="category_name" [(ngModel)]="productObj.category_name" required>                                                                                                                         <option disabled selected value="">Sélectionnez une catégorie...</option>
<option value="Mode &amp; Apparence">Mode &amp; Apparence</option>
<option value="Électronique &amp; High-Tech">Électronique &amp; High-Tech</option>
<option value="Électroménager &amp; Cuisine">Électroménager &amp; Cuisine</option>
<option value="Maison &amp; Décoration">Maison &amp; Décoration</option>
<option value="Alimentation &amp; Supermarché">Alimentation &amp; Supermarché</option>
<option value="Bébé &amp; Enfant">Bébé &amp; Enfant</option>
<option value="Sport &amp; Loisirs">Sport &amp; Loisirs</option>
<option value="Auto &amp; Moto">Auto &amp; Moto</option>
<option value="Bricolage &amp; Matériaux">Bricolage &amp; Matériaux</option>
</select>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Quantité en stock</label>
<input class="w-full px-5 py-4 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-xl transition-all duration-300" placeholder="0" type="number" name="stock" [(ngModel)]="productObj.stock"/>                                                        </div>
<div class="pt-4 space-y-4">
<div class="flex items-center justify-between">
<div>
<p class="font-semibold text-on-surface">Produit phare</p>
<p class="text-xs text-secondary">Afficher en tête de boutique</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value="" name="est_phare" [(ngModel)]="productObj.est_phare"/>
<div class="w-11 h-6 bg-stone-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>                                                                                                                           </label>
</div>
</div>
</div>
</section>
</div>
</div>

<div *ngIf="errorMessage" class="text-red-500 font-semibold mt-8 text-center">{{ errorMessage }}</div>
<div *ngIf="successMessage" class="text-green-600 bg-green-50 p-4 rounded-xl mt-8 font-semibold text-center border border-green-200">{{ successMessage }}</div>

<!-- Action Buttons -->
<div class="mt-8 flex flex-col sm:flex-row items-center justify-end gap-4 pb-8">
  <button type="button" routerLink="/vendor-interface" class="w-full sm:w-auto px-8 py-3.5 rounded-xl font-bold text-on-surface bg-surface-container hover:bg-surface-container-high transition-colors active:scale-95 duration-200">Annuler</button>
  <button type="submit" [disabled]="isLoading" class="w-full sm:w-auto px-10 py-3.5 bg-gradient-to-r from-primary to-primary-container text-white disabled:opacity-50 rounded-xl font-bold shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-95 transition-all duration-200">
    <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    {{ isLoading ? "Publication en cours..." : "Publier le produit" }}
  </button>
</div>
</form>
</div>
